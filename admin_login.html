<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LipaMap — Admin Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(134,239,176,0.35), transparent 55%),
        radial-gradient(circle at 85% 80%, rgba(20,83,45,0.18), transparent 55%),
        linear-gradient(135deg, #f6fbf6 0%, #e8f4ec 100%);
      color: #14532d;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      box-sizing: border-box;
    }
    .back-link {
      position: fixed;
      top: 18px;
      left: 22px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #14532d;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(20,83,45,0.18);
      box-shadow: 0 2px 10px rgba(20,83,45,0.08);
      transition: all 0.15s ease;
    }
    .back-link:hover {
      background: rgba(255,255,255,0.95);
      transform: translateX(-2px);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 18px;
      padding: 32px 28px 28px;
      box-shadow: 0 18px 50px rgba(20,83,45,0.18);
      text-align: center;
    }
    .login-logo {
      font-size: 2.6rem;
      line-height: 1;
      margin-bottom: 8px;
    }
    .login-card h1 {
      margin: 0 0 6px;
      font-family: 'Playfair Display', 'Outfit', serif;
      font-size: 1.6rem;
      color: #14532d;
    }
    .login-card .subtitle {
      margin: 0 0 22px;
      font-size: 0.88rem;
      color: #4b5563;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    .login-form label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #14532d;
      margin-bottom: 4px;
      display: block;
    }
    .login-form input[type="text"],
    .login-form input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 11px 13px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      border: 1.5px solid rgba(20,83,45,0.22);
      border-radius: 10px;
      background: rgba(255,255,255,0.85);
      color: #14532d;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-form input[type="text"]:focus,
    .login-form input[type="password"]:focus {
      outline: none;
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
    }
    .recaptcha-wrap {
      display: flex;
      justify-content: center;
      margin: 6px 0 4px;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: linear-gradient(135deg, #16a34a, #14532d);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(20,83,45,0.25);
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(20,83,45,0.32);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .login-error {
      min-height: 1.1em;
      margin-top: 10px;
      font-size: 0.82rem;
      color: #b91c1c;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>

<a href="/" class="back-link">← Back to map</a>

<main class="login-card">
  <div class="login-logo">🌿</div>
  <h1>Admin Login</h1>
  <p class="subtitle">Sign in to manage Lipa City locations.</p>

  <form class="login-form" onsubmit="event.preventDefault(); submitLogin();">
    <div>
      <label for="adminUsername">Username</label>
      <input type="text" id="adminUsername" autocomplete="username" placeholder="Enter your username" />
    </div>
    <div>
      <label for="adminPassword">Password</label>
      <input type="password" id="adminPassword" autocomplete="current-password" placeholder="Enter your password" />
    </div>
    <div class="recaptcha-wrap">
      <div class="g-recaptcha" data-sitekey="6LeAAO0sAAAAAJAg0dBoxlhtoIYYbpyLaPdFn2Ef"></div>
    </div>
    <button type="submit" id="loginBtn" class="login-btn">Login</button>
  </form>

  <div class="login-error" id="loginError"></div>
</main>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script>
  function setError(msg) {
    document.getElementById('loginError').textContent = msg || '';
  }

  function submitLogin() {
    var usernameEl = document.getElementById('adminUsername');
    var passwordEl = document.getElementById('adminPassword');
    var username   = (usernameEl.value || '').trim();
    var password   = (passwordEl.value || '').trim();
    var token      = '';
    if (typeof grecaptcha !== 'undefined' && grecaptcha && typeof grecaptcha.getResponse === 'function') {
      token = grecaptcha.getResponse();
    }

    if (!username || !password || !token) {
      setError('Please complete all fields and the CAPTCHA.');
      return;
    }

    setError('');

    fetch('/api/verify-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: username,
        password: password,
        captcha_token: token
      })
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data && data.success === true) {
        sessionStorage.setItem('lipamap_admin', '1');
        window.location.href = '/';
        return;
      }
      setError((data && data.error) || 'Login failed');
      if (typeof grecaptcha !== 'undefined' && grecaptcha && typeof grecaptcha.reset === 'function') {
        grecaptcha.reset();
      }
      passwordEl.value = '';
      usernameEl.focus();
    })
    .catch(function () {
      setError('Network error. Please try again.');
      if (typeof grecaptcha !== 'undefined' && grecaptcha && typeof grecaptcha.reset === 'function') {
        grecaptcha.reset();
      }
    });
  }

  document.getElementById('loginBtn').addEventListener('click', function (e) {
    e.preventDefault();
    submitLogin();
  });

  function onEnter(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      submitLogin();
    }
  }
  document.getElementById('adminUsername').addEventListener('keyup', onEnter);
  document.getElementById('adminPassword').addEventListener('keyup', onEnter);
</script>

</body>
</html>
